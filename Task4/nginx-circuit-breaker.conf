# Прокси NovaMarket для внешнего логистического сервиса.
# Это passive circuit breaker на базе max_fails/fail_timeout в NGINX open source.
#
# Важное ограничение open-source NGINX:
# max_fails=5 не означает «5 последовательных ошибок подряд» — это «5 ошибок в течение fail_timeout секунд».
# Между ошибками могут быть успешные запросы, и счётчик всё равно накопится до 5.
# Точная семантика «N последовательных ошибок» доступна только в NGINX Plus (директива health_check consecutive).
# Для open-source NGINX max_fails/fail_timeout является наилучшим приближением к паттерну Circuit Breaker.
#
# После истечения fail_timeout NGINX снова пробует upstream и восстанавливает вызовы, если сервис отвечает.

http {
    upstream logistics_backend {
        server logistics.company.com max_fails=5 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name novamarket.local;

        location /logistics/ {
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            proxy_send_timeout 3s;

            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_intercept_errors on;

            error_page 500 502 503 504 = @logistics_fallback;

            proxy_set_header Host logistics.company.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;

            proxy_pass https://logistics_backend;
        }

        location @logistics_fallback {
            internal;
            default_type application/json;
            return 503 '{"status":"unavailable","message":"Logistics provider is temporarily unavailable. Please retry later."}';
        }
    }
}
