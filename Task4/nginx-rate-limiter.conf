# Rate limiter для API NovaMarket.
# Клиенты обращаются к одному endpoint /api/, но лимит выбирается по X-Client-Type.

http {
    # Веб-клиенты ограничиваются по IP: до 50 запросов в секунду.
    # Только запросы с X-Client-Type: web получают непустой ключ для этой зоны.
    map $http_x_client_type $web_limit_key {
        default "";
        web     $binary_remote_addr;
    }

    # Мобильные клиенты ограничиваются по IP: до 30 запросов в секунду.
    # Неизвестные клиенты по умолчанию используют более строгий mobile limit.
    map $http_x_client_type $mobile_limit_key {
        default $binary_remote_addr;
        mobile  $binary_remote_addr;
        web     "";
    }

    limit_req_zone $web_limit_key zone=web_limit:10m rate=50r/s;
    limit_req_zone $mobile_limit_key zone=mobile_limit:10m rate=30r/s;

    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name novamarket.local;

        # Возвращаем HTTP 429, если клиент превышает выбранный rate limit.
        limit_req_status 429;

        location /api/ {
            # Только одна из этих зон получает непустой ключ для запроса:
            # - web_limit для X-Client-Type: web
            # - mobile_limit для X-Client-Type: mobile или неизвестного значения
            limit_req zone=web_limit;
            limit_req zone=mobile_limit;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://backend;
        }
    }
}
